# Axe DevTools Linter configuration for Certiq.
#
# Disable rules that produce false positives on React/JSX dynamic expressions.
# React correctly renders boolean/number ARIA attribute values as proper strings
# in the DOM at runtime. The static linter cannot evaluate JSX expressions like
# {condition ? "true" : "false"} and incorrectly flags them.
#
# Similarly, the "label" rule cannot resolve dynamic htmlFor/id associations
# generated in .map() loops.
#
# The "css-in-js" inline style warnings are suppressed because dynamic styles
# (e.g., computed widths, opacity from CSS variables) require inline styles.

rules:
  aria-valid-attr-value: false
  label: false

exclude:
  - "node_modules/**"
  - ".next/**"
  - "dist/**"
